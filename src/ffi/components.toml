[[component]]
name = "vk_begin_vstack"
kind = "container"
arguments = [
    { name = "gap", type = "u32", convert = "decode_stack_gap(gap)?" },
    { name = "alignment", type = "u32", convert = "decode_stack_alignment(alignment)?" },
    { name = "distribution", type = "u32", convert = "decode_stack_distribution(distribution)?" },
]
node = """
ViewNodeKind::VStack(VStackNode {
    gap,
    alignment,
    distribution,
})
"""

[[component]]
name = "vk_begin_hstack"
kind = "container"
arguments = [
    { name = "gap", type = "u32", convert = "decode_stack_gap(gap)?" },
    { name = "alignment", type = "u32", convert = "decode_stack_alignment(alignment)?" },
    { name = "distribution", type = "u32", convert = "decode_stack_distribution(distribution)?" },
]
node = """
ViewNodeKind::HStack(HStackNode {
    gap,
    alignment,
    distribution,
})
"""

[[component]]
name = "vk_begin_zstack"
kind = "container"
arguments = [
    { name = "alignment", type = "u32", convert = "decode_zstack_alignment(alignment)?" },
]
node = """
ViewNodeKind::ZStack(ZStackNode {
    alignment,
})
"""

[[component]]
name = "vk_begin_padding"
kind = "container"
arguments = [
    { name = "top", type = "f32", convert = "sanitize_length(top)" },
    { name = "right", type = "f32", convert = "sanitize_length(right)" },
    { name = "bottom", type = "f32", convert = "sanitize_length(bottom)" },
    { name = "left", type = "f32", convert = "sanitize_length(left)" },
]
node = """
ViewNodeKind::Padding(PaddingNode {
    top,
    right,
    bottom,
    left,
})
"""

[[component]]
name = "vk_begin_frame"
kind = "container"
arguments = [
    { name = "width", type = "VkLength", convert = "decode_layout_length(width)?" },
    { name = "height", type = "VkLength", convert = "decode_layout_length(height)?" },
]
node = """
ViewNodeKind::Frame(FrameNode {
    width,
    height,
})
"""

[[component]]
name = "vk_begin_background"
kind = "container"
arguments = [
    { name = "style", type = "VkRectangleStyle", bind = "properties", convert = "decode_rectangle_style(style)?" },
]
node = """
ViewNodeKind::Background(properties)
"""

[[component]]
name = "vk_push_text"
kind = "leaf"
arguments = [
    { name = "content", type = "VkString", convert = "copy_string(content)?" },
    { name = "font_size", type = "f32", convert = "finite_or_default(font_size, 16.0)" },
    { name = "line_height", type = "f32", convert = "finite_or_default(line_height, 24.0)" },
    { name = "weight", type = "u16" },
    { name = "alignment", type = "u32", convert = "decode_text_alignment(alignment)?" },
    { name = "color", type = "u32", convert = "decode_text_color(color)?" },
]
node = """
ViewNodeKind::Text(TextNode {
    content,
    font_family: String::from("Noto Sans JP"),
    font_size,
    line_height,
    weight,
    alignment,
    color,
})
"""

[[component]]
name = "vk_push_button"
kind = "leaf"
arguments = [
    { name = "title", type = "VkString", convert = "copy_string(title)?" },
    { name = "color", type = "u32", convert = "decode_button_color(color)?" },
    { name = "radius", type = "f32", convert = "sanitize_length(radius)" },
    { name = "action_id", type = "u64", bind = "action", convert = "if action_id == 0 { None } else { Some(ActionId(action_id)) }" },
]
node = """
ViewNodeKind::Button(ButtonNode {
    title,
    color,
    radius,
    action,
})
"""

[[component]]
name = "vk_push_spacer"
kind = "leaf"
node = """
ViewNodeKind::Spacer
"""

[[component]]
name = "vk_push_divider"
kind = "leaf"
node = """
ViewNodeKind::Divider
"""

[[component]]
name = "vk_push_rectangle"
kind = "leaf"
arguments = [
    { name = "style", type = "VkRectangleStyle", bind = "properties", convert = "decode_rectangle_style(style)?" },
]
node = """
ViewNodeKind::Rectangle(properties)
"""